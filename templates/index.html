<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator</title>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="app-container">
    <div class="card">
        <h1>Password Generator</h1>
        <p class="subtitle">Create strong passwords in seconds</p>

        <form id="passwordForm">
            <div class="form-group">
                <label for="length">Minimum Length</label>
                <input type="number" id="length" name="length" min="4" value="12" required>
            </div>

            <div class="form-group options">
                <label><input type="checkbox" id="uppercase" checked> Include Uppercase (A-Z)</label>
                <label><input type="checkbox" id="lowercase" checked> Include Lowercase (a-z)</label>
                <label><input type="checkbox" id="numbers" checked> Include Numbers (0-9)</label>
                <label><input type="checkbox" id="symbols" checked> Include Symbols (!@#$%^&*)</label>
            </div>

            <button type="submit" class="generate-btn">Generate Password</button>
        </form>

        <div class="result" id="result" style="display:none;">
            <p>Generated Password:</p>
            <div class="password-box">
                <input type="text" id="passwordField" readonly>
                <button id="copyBtn">Copy</button>
            </div>
            <p>Password Strength: <span id="strengthText"></span></p>
        </div>
    </div>
</div>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
